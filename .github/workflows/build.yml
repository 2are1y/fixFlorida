name: Florida

on:
  schedule:
    - cron: "0 9/12 * * *"
  workflow_dispatch:
    inputs:
      frida_version:
        description: "Frida tag to build; leave empty to use the latest release"
        required: false
        type: string
      force_rebuild:
        description: "Replace existing release assets after a successful build"
        required: false
        default: false
        type: boolean
  push:
    branches: ["main", "ci"]
    paths:
      - ".github/workflows/build.yml"
      - "scripts/**"
      - "requirements-build.txt"

permissions:
  contents: write

concurrency:
  group: florida-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Resolve Frida release
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_VERSION: ${{ inputs.frida_version }}
        run: |
          set -Eeuo pipefail

          if [[ -n "${REQUESTED_VERSION:-}" ]]; then
            version="$REQUESTED_VERSION"
          else
            version="$(gh api repos/frida/frida/releases/latest --jq '.tag_name')"
          fi

          [[ -n "$version" ]] || {
            echo "::error::Unable to resolve a Frida release tag"
            exit 1
          }

          gh api "repos/frida/frida/git/ref/tags/$version" >/dev/null
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Selected Frida release: $version"

      - name: Decide whether to build
        id: decide
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.resolve.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: |
          set -Eeuo pipefail

          release_exists=false
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            release_exists=true
          fi

          should_build=true
          case "$EVENT_NAME" in
            schedule)
              [[ "$release_exists" == true ]] && should_build=false
              ;;
            workflow_dispatch)
              if [[ "$release_exists" == true && "${FORCE_REBUILD:-false}" != "true" ]]; then
                should_build=false
              fi
              ;;
            push)
              should_build=true
              ;;
          esac

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          echo "Release exists: $release_exists; should build: $should_build"

  preflight:
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      FRIDA_VERSION: ${{ needs.resolve.outputs.version }}

    steps:
      - name: Checkout Florida
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install preflight dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            binutils
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --requirement requirements-build.txt
          python - <<'PY'
          import lief
          print("LIEF:", getattr(lief, "__version__", "unknown"))
          PY

      - name: Self-test Florida postprocessor
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            scripts/apply_florida.py \
            scripts/anti_anti_frida.py \
            scripts/selftest_apply_florida.py \
            scripts/selftest_postprocessor.py
          python scripts/selftest_apply_florida.py \
            --script "$GITHUB_WORKSPACE/scripts/apply_florida.py" \
            --anti-script "$GITHUB_WORKSPACE/scripts/anti_anti_frida.py" \
            --policy "$GITHUB_WORKSPACE/scripts/anti_anti_frida_policy.json"
          python scripts/selftest_postprocessor.py \
            --script "$GITHUB_WORKSPACE/scripts/anti_anti_frida.py" \
            --policy "$GITHUB_WORKSPACE/scripts/anti_anti_frida_policy.json"

      - name: Clone the exact Frida release
        shell: bash
        run: |
          set -Eeuo pipefail
          git clone \
            --branch "$FRIDA_VERSION" \
            --depth 1 \
            --recurse-submodules \
            --shallow-submodules \
            https://github.com/frida/frida.git

          actual="$(git -C frida describe --tags --exact-match)"
          [[ "$actual" == "$FRIDA_VERSION" ]] || {
            echo "::error::Expected $FRIDA_VERSION, checked out $actual"
            exit 1
          }

      - name: Verify source transformations against upstream
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/apply_florida.py \
            --frida-root "$GITHUB_WORKSPACE/frida" \
            --anti-script "$GITHUB_WORKSPACE/scripts/anti_anti_frida.py" \
            --anti-policy "$GITHUB_WORKSPACE/scripts/anti_anti_frida_policy.json"

          git -C frida/subprojects/frida-core diff --check
          git -C frida/subprojects/frida-gum diff --check
          git -C frida/subprojects/frida-core diff --stat
          git -C frida/subprojects/frida-gum diff --stat

  build-android:
    needs: [resolve, preflight]
    if: needs.resolve.outputs.should_build == 'true' && needs.preflight.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        arch:
          - android-arm
          - android-arm64
          - android-x86
          - android-x86_64

    env:
      FRIDA_VERSION: ${{ needs.resolve.outputs.version }}
      TARGET_ARCH: ${{ matrix.arch }}

    steps:
      - name: Checkout Florida
        uses: actions/checkout@v4

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost || true
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          local-cache: false
          link-to-sdk: true

      - name: Install build dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            flex \
            bison \
            ninja-build \
            gcc-multilib \
            g++-multilib \
            libc6-dev \
            libc6-dev-i386 \
            ruby \
            ruby-dev \
            xz-utils

          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --requirement requirements-build.txt
          python - <<'PY'
          import lief
          print("LIEF:", getattr(lief, "__version__", "unknown"))
          PY

      - name: Clone the exact Frida release
        shell: bash
        run: |
          set -Eeuo pipefail
          git clone \
            --branch "$FRIDA_VERSION" \
            --depth 1 \
            --recurse-submodules \
            --shallow-submodules \
            https://github.com/frida/frida.git

          actual="$(git -C frida describe --tags --exact-match)"
          [[ "$actual" == "$FRIDA_VERSION" ]] || {
            echo "::error::Expected $FRIDA_VERSION, checked out $actual"
            exit 1
          }

      - name: Apply Florida source transformations
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/apply_florida.py \
            --frida-root "$GITHUB_WORKSPACE/frida" \
            --anti-script "$GITHUB_WORKSPACE/scripts/anti_anti_frida.py" \
            --anti-policy "$GITHUB_WORKSPACE/scripts/anti_anti_frida_policy.json"

          git -C frida/subprojects/frida-core diff --check
          git -C frida/subprojects/frida-gum diff --check
          git -C frida/subprojects/frida-core diff --stat
          git -C frida/subprojects/frida-gum diff --stat

      - name: Configure and build
        shell: bash
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -Eeuo pipefail
          export ANDROID_NDK_ROOT
          export PATH="$ANDROID_NDK_ROOT:$PATH"
          export FLORIDA_REPORT_DIR="$GITHUB_WORKSPACE/verification/$TARGET_ARCH"
          mkdir -p "$FLORIDA_REPORT_DIR"

          mkdir "build-$TARGET_ARCH"
          cd "build-$TARGET_ARCH"
          ../frida/configure --host="$TARGET_ARCH"
          make -j"$(nproc)"

      - name: Validate agent transformation receipts
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          expected_markers = {
              "FridaScriptEngine",
              "GLib-GIO",
              "GDBusProxy",
              "GumScript",
              "gum-js-loop",
              "gmain",
              "gdbus",
          }

          report_dir = (
              Path(os.environ["GITHUB_WORKSPACE"])
              / "verification"
              / os.environ["TARGET_ARCH"]
          )
          reports = sorted(report_dir.glob("*.florida.json"))
          if not reports:
              raise SystemExit(f"No Florida verification reports found in {report_dir}")

          for report_path in reports:
              report = json.loads(report_path.read_text(encoding="utf-8"))
              if report.get("status") != "verified":
                  raise SystemExit(f"Unverified report: {report_path}")

              original_hash = report.get("original_sha256")
              transformed_hash = report.get("transformed_sha256")
              if not original_hash or not transformed_hash or original_hash == transformed_hash:
                  raise SystemExit(f"Agent was not verifiably modified: {report_path}")

              entrypoint = report.get("entrypoint", {})
              if entrypoint.get("old_after") != 0:
                  raise SystemExit(f"Residual active entrypoint symbol in {report_path}")
              if entrypoint.get("dynamic_old_after") != 0:
                  raise SystemExit(f"Residual dynamic entrypoint symbol in {report_path}")
              if (
                  entrypoint.get("dynamic_old_before", 0) > 0
                  or entrypoint.get("dynamic_main_before", 0) > 0
              ) and entrypoint.get("dynamic_main_after", 0) < 1:
                  raise SystemExit(f"Dynamic main entrypoint missing: {report_path}")
              if entrypoint.get("old_before", 0) > 0 and entrypoint.get("renamed", 0) < 1:
                  raise SystemExit(f"Entrypoint rename was not recorded: {report_path}")

              markers = report.get("markers")
              if not isinstance(markers, dict) or set(markers) != expected_markers:
                  raise SystemExit(f"Incomplete marker report: {report_path}")
              for name, marker in markers.items():
                  if marker.get("policy") == "required" and marker.get("hits", 0) < 1:
                      raise SystemExit(
                          f"Required marker {name} was not transformed in {report_path}"
                      )

              checked = set(report.get("forbidden_markers_checked", []))
              required_checks = {"frida_agent_main", "gum-js-loop", "gmain"}
              if not required_checks.issubset(checked):
                  raise SystemExit(f"Incomplete residual scan record: {report_path}")

              print(report_path.read_text(encoding="utf-8"))
          PY

      - name: Upload verification reports
        uses: actions/upload-artifact@v4
        with:
          name: florida-verification-${{ env.FRIDA_VERSION }}-${{ matrix.arch }}
          path: verification/${{ matrix.arch }}/*.florida.json
          if-no-files-found: error
          retention-days: 14

      - name: Package frida-server
        shell: bash
        run: |
          set -Eeuo pipefail
          server="build-$TARGET_ARCH/subprojects/frida-core/server/frida-server"
          [[ -s "$server" ]] || {
            echo "::error::frida-server was not produced at $server"
            find "build-$TARGET_ARCH" -type f -name 'frida-server*' -print || true
            exit 1
          }

          mkdir -p dist
          gzip -9 -c "$server" > \
            "dist/florida-server-${FRIDA_VERSION}-${TARGET_ARCH}.gz"
          test -s "dist/florida-server-${FRIDA_VERSION}-${TARGET_ARCH}.gz"
          ls -lh dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: florida-${{ env.FRIDA_VERSION }}-${{ matrix.arch }}
          path: dist/*.gz
          if-no-files-found: error
          retention-days: 7

  publish-release:
    needs: [resolve, build-android]
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      FRIDA_VERSION: ${{ needs.resolve.outputs.version }}

    steps:
      - name: Download all architecture artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: florida-${{ env.FRIDA_VERSION }}-*
          path: dist
          merge-multiple: true

      - name: Validate release payload
        shell: bash
        run: |
          set -Eeuo pipefail
          expected=(
            "dist/florida-server-${FRIDA_VERSION}-android-arm.gz"
            "dist/florida-server-${FRIDA_VERSION}-android-arm64.gz"
            "dist/florida-server-${FRIDA_VERSION}-android-x86.gz"
            "dist/florida-server-${FRIDA_VERSION}-android-x86_64.gz"
          )

          for file in "${expected[@]}"; do
            [[ -s "$file" ]] || {
              echo "::error::Missing release asset: $file"
              exit 1
            }
          done

          (cd dist && sha256sum florida-server-*.gz > SHA256SUMS.txt)
          cat dist/SHA256SUMS.txt

      - name: Publish only after every build succeeds
        shell: bash
        run: |
          set -Eeuo pipefail

          release_notes="Florida Android frida-server builds based on Frida $FRIDA_VERSION."

          if gh release view "$FRIDA_VERSION" \
              --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$FRIDA_VERSION" \
              dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$FRIDA_VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$FRIDA_VERSION" \
              --notes "$release_notes"
          else
            gh release create "$FRIDA_VERSION" \
              dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$FRIDA_VERSION" \
              --notes "$release_notes"
          fi
